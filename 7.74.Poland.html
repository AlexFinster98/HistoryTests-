<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7.74.Poland</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: #fff; border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    max-width: 680px; width: 100%; padding: 40px;
    animation: rise .45s ease-out;
  }
  @keyframes rise { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
  h1 { font-size: 26px; color: #667eea; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #aaa; margin-bottom: 28px; }
  .btn {
    display:block; width:100%; padding:14px; border:none; border-radius:10px;
    cursor:pointer; font-size:15px; font-weight:700; color:#fff;
    background: linear-gradient(135deg, #667eea, #764ba2);
    transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(102,126,234,.45); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity:.55; cursor:not-allowed; transform:none; box-shadow:none; }
  #screen-intro { display:block; }
  .logo { text-align:center; margin-bottom:24px; font-size:64px; line-height:1; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
  .field { text-align:left; }
  .field.wide { grid-column:1 / -1; }
  .field label { display:block; font-size:12px; font-weight:700; color:#667eea; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
  .field input { width:100%; padding:11px 13px; font-size:14px; border:2px solid #e0e0e0; border-radius:8px; font-family:inherit; color:#333; transition:border-color .2s; }
  .field input:focus { outline:none; border-color:#667eea; }
  .hint { font-size:11px; color:#bbb; margin-top:14px; text-align:center; }
  #screen-quiz { display:none; }
  .quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  .quiz-title { font-size:15px; color:#667eea; font-weight:700; }
  .quiz-counter { font-size:22px; font-weight:800; color:#667eea; }
  .timer-wrap { margin-bottom:6px; }
  .timer-label { display:flex; justify-content:space-between; font-size:12px; color:#aaa; margin-bottom:5px; }
  .timer-track { height:8px; background:#eee; border-radius:10px; overflow:hidden; }
  .timer-bar { height:100%; width:100%; border-radius:10px; background:linear-gradient(90deg,#667eea,#764ba2); transition:width .12s linear, background .3s; }
  .timer-bar.warn { background:linear-gradient(90deg,#f59e0b,#d97706); }
  .timer-bar.danger { background:linear-gradient(90deg,#ef4444,#dc2626); animation:blink .5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.6} }
  .q-text { font-size:19px; font-weight:700; color:#222; line-height:1.4; margin:22px 0 20px; }
  .options { display:flex; flex-direction:column; gap:11px; }
  .opt { padding:13px 16px; border:2px solid #e0e0e0; border-radius:10px; cursor:pointer; transition:all .2s; background:#fff; }
  .opt:hover { border-color:#667eea; background:#f4f4ff; transform:translateX(4px); }
  .opt.selected { border-color:#667eea; background:#eef0ff; }
  .opt label { display:flex; align-items:center; gap:12px; cursor:pointer; font-size:15px; color:#333; }
  .opt input[type=radio] { accent-color:#667eea; width:16px; height:16px; }
  #screen-result { display:none; }
  .summary { background:#f3f5ff; border-radius:12px; padding:22px; margin-bottom:24px; }
  .summary-row { display:flex; justify-content:space-between; align-items:baseline; padding:7px 0; border-bottom:1px solid #e8eaf6; font-size:14px; }
  .summary-row:last-child { border-bottom:none; }
  .summary-row .lbl { color:#777; }
  .summary-row .val { font-weight:700; color:#333; }
  .grade-badge { display:inline-block; font-size:32px; font-weight:900; padding:4px 18px; border-radius:10px; color:#fff; }
  .answers-list { margin-bottom:26px; }
  .a-item { background:#fafafa; border-radius:8px; padding:12px 14px; margin-bottom:10px; border-left:4px solid #e0e0e0; }
  .a-item.correct { border-left-color:#28a745; }
  .a-item.wrong { border-left-color:#dc3545; }
  .a-item .q-num { font-size:12px; color:#aaa; margin-bottom:4px; }
  .a-item .q-t { font-size:14px; font-weight:600; color:#333; margin-bottom:6px; }
  .a-item .a-row { font-size:13px; }
  .a-item .ok { color:#28a745; font-weight:700; }
  .a-item .fail { color:#dc3545; font-weight:700; }
  .a-item .correct-ans { color:#28a745; font-size:12px; margin-top:3px; }
  .send-box { background:#f0fff4; border:2px solid #d4edda; border-radius:12px; padding:20px; margin-bottom:24px; text-align:center; }
  .send-box h3 { font-size:16px; color:#155724; margin-bottom:10px; }
  #sendStatus { font-size:13px; color:#555; margin-bottom:14px; }
  @media (max-width:560px) {
    .card { padding:24px; } h1 { font-size:21px; }
    .form-grid { grid-template-columns:1fr; } .q-text { font-size:17px; }
  }
</style>
</head>
<body>
<div class="card">

  <div id="screen-intro">
    <div class="logo">⚔️</div>
    <h1>7.74.Poland</h1>
    <p class="sub">Алексей Михайлович. Начало войны с Польшей</p>
    <div class="form-grid">
      <div class="field"><label>Имя *</label><input id="fName" type="text" placeholder="Иван" autocomplete="off"></div>
      <div class="field"><label>Фамилия *</label><input id="fLast" type="text" placeholder="Петров" autocomplete="off"></div>
      <div class="field wide"><label>Класс *</label><input id="fClass" type="text" placeholder="Например: 7А" autocomplete="off"></div>
    </div>
    <button class="btn" onclick="startQuiz()">Начать тест →</button>
    <p class="hint">* обязательные поля</p>
  </div>

  <div id="screen-quiz">
    <div class="quiz-header"><span class="quiz-title">7.74.Poland</span><span id="qCounter" class="quiz-counter">1/5</span></div>
    <div class="timer-wrap">
      <div class="timer-label"><span>Время</span><span id="timerSec">6 сек</span></div>
      <div class="timer-track"><div id="timerBar" class="timer-bar"></div></div>
    </div>
    <div id="qText" class="q-text"></div>
    <div id="optList" class="options"></div>
    <button class="btn" style="margin-top:26px" onclick="nextQuestion()">Далее →</button>
  </div>

  <div id="screen-result">
    <h1>✅ Тест завершён!</h1>
    <p class="sub">Результаты зафиксированы</p>
    <div class="summary" id="summaryBlock"></div>
    <h3 style="font-size:15px;color:#444;margin-bottom:12px">Разбор ответов</h3>
    <div class="answers-list" id="answersList"></div>
    <div class="send-box">
      <h3>📊 Отправка результатов учителю</h3>
      <p id="sendStatus">Нажмите кнопку — данные уйдут в таблицу автоматически</p>
      <button class="btn" id="sendBtn" onclick="sendResults()" style="max-width:320px;margin:0 auto">📤 Отправить результаты</button>
    </div>
    <button class="btn" onclick="location.reload()" style="background:linear-gradient(135deg,#6c757d,#495057)">🔄 Пройти заново</button>
  </div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyAK0g6S7_HTpSWhFYBzXaXsjwGSQQRw7mcL2Z1xWDT6fWzI4FxjSC2PPdPXe9d2c0kgQ/exec';

/* ═══════════ ФИЛЬТР ═══════════ */
const BANNED_WORDS = ["аборт","анус","басран","бикса","блуд","блудилище","букакке","вагина","влагалище","волосянка","выеть","выпердеть","выпердыш","выссака","высцаный","глиста","гнида","говенка","говешка","говназия","говнюха","говнядина","говнять","дермо","дерьмище","долдон","дрист","дристануть","дристни","дура","дурак","заговнять","засерун","засирать","засраный","курвенок","курвин","курвяжник","курвяжница","курвяжный","мокрохвостка","мокрощелка","моча","наговнять","насцать","нахезать","недомерок","обосцать","обосцаться","обсирать","отпороть","пенис","перданная","перданное","перданный","пердел","пердение","пердильник","пердунина","пердунья","пердуха","передок","пернуть","пипишка","письку","писять","питишка","плеха","подхвостие","попысать","посрал","поцоватый","презерватив","проскотина","просраная","проссаная","пысать","растыка","сволота","секель","серун","серька","сика","сикать","сикель","сирано","сирать","скотина","скотское","скуреха","скурея","скуряга","скуряжничать","сосать","сосущее","срака","сраный","сраным","срать","срун","ссака","ссаки","ссаное","ссать","старпер","струк","сцавинье","сцака","сцаки","сцание","сцуль","сыкун","титечка","титечный","титка","титочка","титька","триговногнойная","трипер","триперданутая","усцаться","фик","хезать","хуй","жопа","пизда","с ушами пизда"];
const BANNED_MEMES = ["черемша","67","sixseven","превед","жиза","ничоси","кандибобер","я думала сова","ждун","окаянная","ахахахаха боже какая гадость","это фиаско братан","бабка противна я противен","слабоумие и отвага","норм","краш","шипперить","ору","изнанка","скибиди туалет","сигма","альфа","бета","я во рту","мечтаю","как деньги но лучше","у меня нет к этому вопросов","это база","сначала база потом академия","а что если","сплэш вест","срочно нц","ливнул","го","трэш","кринж","испанский стыд","рофл","рили","паль","спалился","шок контент","еду в поезде","сосёчка","девочка с каре","не вывожу","синдром утёнка","а мне всё равно","ваще не о чём","я затупил","сложные минуты","миньон","ты норм","это какой-то позор","ой всё","танцы кнопка бабло","где логика","я не знает","падажжи","убей себя об стену","вжух","ахахах вау"];

const COMMON_MAP = {'0':'о','1':'и','3':'з','5':'с','6':'б','7':'т','8':'в','9':'д','@':'а','$':'с','a':'а','c':'с','e':'е','f':'ф','g':'г','i':'и','j':'ж','k':'к','l':'л','m':'м','o':'о','q':'к','r':'р','s':'с','t':'т','u':'у','v':'в','w':'ш','x':'х','y':'у','z':'з','d':'д','ё':'е','й':'и'};
function makeNorm(extra){const M=Object.assign({},COMMON_MAP,extra);return function(s){s=(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');let o='';for(const ch of s)o+=(M[ch]!==undefined?M[ch]:ch);o=o.replace(/[ьъ]/g,'');o=o.replace(/[^а-я]/g,'');o=o.replace(/(.)\1+/g,'$1');return o;};}
const normA=makeNorm({'p':'р','n':'п','h':'н','b':'в','4':'ч'});
const normB=makeNorm({'p':'п','n':'н','h':'х','b':'б','4':'а'});
const BANNED_NORM=[...new Set(BANNED_WORDS.map(normA))].filter(Boolean);
const MEME_NORM=[...new Set(BANNED_MEMES.map(normA))].filter(Boolean);
function findBanned(values){const items=values.map(v=>({raw:v,a:normA(v),b:normB(v)}));for(const it of items)for(const w of BANNED_NORM)if(it.a.includes(w)||it.b.includes(w))return it.raw;for(const it of items)for(const m of MEME_NORM){if(m.length>=5){if(it.a.includes(m)||it.b.includes(m))return it.raw;}else{if(it.a===m||it.b===m)return it.raw;}}return null;}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function showGotcha(word){clearInterval(ticker);document.querySelector('.card').innerHTML='<div style="text-align:center;padding:24px 0"><div style="font-size:64px;margin-bottom:20px">🙃</div><h1 style="color:#dc3545;margin-bottom:18px">Упс…</h1><p style="font-size:18px;color:#333;line-height:1.55">Все мы посмеялись с твоего смешного «'+escapeHtml(word)+'». А теперь в конце урока сдаёшь тетрадь :)</p></div>';}

/* ═══════════ ВОПРОСЫ ═══════════ */
const QUESTIONS = [
  {
    q: 'Почему православное население Беларуси и Украины было недовольно властью Речи Посполитой?',
    opts: [
      'Их принуждали к католичеству',
      'У них отбирали землю под пашню',
      'Их заставляли служить в польском флоте',
      'Им запрещали торговать с Москвой'
    ],
    ans: 0
  },
  {
    q: 'Что создали православные казаки, не желая подчиняться полякам?',
    opts: [
      'Союз с Крымским ханством',
      'Своё независимое Запорожское государство (Сечь)',
      'Польское католическое братство',
      'Совместное войско с Ригой'
    ],
    ans: 1
  },
  {
    q: 'Кто был главой (лидером) запорожских казаков?',
    opts: ['Алексей Трубецкой', 'Алексей Михайлович', 'Богдан Хмельницкий', 'Иван Шклов'],
    ans: 2
  },
  {
    q: 'Чем для царя Алексея Михайловича была особенна русско-польская война?',
    opts: [
      'Это была единственная война, в которой он участвовал лично',
      'Он не принимал в ней никакого участия',
      'Он вёл её против собственных казаков',
      'Это была первая морская война России'
    ],
    ans: 0
  },
  {
    q: 'В какие годы шла русско-польская война?',
    opts: ['1612 – 1618 годы', '1654 – 1667 годы', '1700 – 1721 годы', '1632 – 1634 годы'],
    ans: 1
  }
];

const GRADES = {0:'5',1:'4',2:'4−',3:'3',4:'2',5:'2'};
const GRADE_COLORS = {'5':'#28a745','4':'#17a2b8','4−':'#17a2b8','3':'#ffc107','2':'#dc3545'};

let quiz=[],cur=0,answers=[];
let firstName='',lastName='',klass='';
let resultsPayload=null,ticker=null,secsLeft=6;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){document.getElementById(id).style.display='block';}
function hide(id){document.getElementById(id).style.display='none';}

function startQuiz(){
  firstName=document.getElementById('fName').value.trim();
  lastName=document.getElementById('fLast').value.trim();
  klass=document.getElementById('fClass').value.trim();
  const bad=findBanned([firstName,lastName,klass]);
  if(bad){showGotcha(bad);return;}
  if(!firstName){alert('Введите имя');return;}
  if(!lastName){alert('Введите фамилию');return;}
  if(!klass){alert('Введите класс');return;}
  quiz=shuffle(QUESTIONS);answers=new Array(quiz.length).fill(-1);cur=0;
  hide('screen-intro');show('screen-quiz');renderQuestion();
}

function renderQuestion(){
  const q=quiz[cur];
  document.getElementById('qCounter').textContent=`${cur+1}/5`;
  document.getElementById('qText').textContent=q.q;
  const opts=shuffle(q.opts.map((t,i)=>({t,i})));
  document.getElementById('optList').innerHTML=opts.map(o=>`
    <div class="opt" id="opt-${o.i}" onclick="pick(${o.i},this)">
      <label><input type="radio" name="opt" value="${o.i}" ${answers[cur]===o.i?'checked':''}> ${o.t}</label>
    </div>`).join('');
  if(answers[cur]!==-1){const el=document.getElementById(`opt-${answers[cur]}`);if(el)el.classList.add('selected');}
  startTimer();
}
function pick(idx,el){answers[cur]=idx;document.querySelectorAll('.opt').forEach(d=>d.classList.remove('selected'));el.classList.add('selected');el.querySelector('input').checked=true;}
function startTimer(){clearInterval(ticker);secsLeft=6;updateTimerUI(secsLeft);ticker=setInterval(()=>{secsLeft--;updateTimerUI(secsLeft);if(secsLeft<0){clearInterval(ticker);nextQuestion();}},1000);}
function updateTimerUI(s){const pct=(s/6)*100;const bar=document.getElementById('timerBar');bar.style.width=pct+'%';bar.className='timer-bar'+(pct<25?' danger':pct<50?' warn':'');document.getElementById('timerSec').textContent=`${Math.max(s,0)} сек`;}
function nextQuestion(){clearInterval(ticker);cur++;if(cur<quiz.length){renderQuestion();}else{showResult();}}

function showResult(){
  hide('screen-quiz');show('screen-result');
  let correct=0;quiz.forEach((q,i)=>{if(answers[i]===q.ans)correct++;});
  const errors=quiz.length-correct,pct=Math.round((correct/quiz.length)*100);
  const grade=GRADES[errors]??'2',gradeCol=GRADE_COLORS[grade]??'#dc3545';
  const now=new Date();
  const dtStr=now.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('summaryBlock').innerHTML=`
    <div class="summary-row"><span class="lbl">Ученик</span><span class="val">${escapeHtml(lastName)} ${escapeHtml(firstName)}</span></div>
    <div class="summary-row"><span class="lbl">Класс</span><span class="val">${escapeHtml(klass)}</span></div>
    <div class="summary-row"><span class="lbl">Правильных ответов</span><span class="val">${correct} из ${quiz.length}</span></div>
    <div class="summary-row"><span class="lbl">Ошибок</span><span class="val">${errors}</span></div>
    <div class="summary-row"><span class="lbl">Результат</span><span class="val">${pct}%</span></div>
    <div class="summary-row" style="margin-top:6px"><span class="lbl" style="font-size:16px;font-weight:700">Оценка</span><span class="grade-badge" style="background:${gradeCol}">${grade}</span></div>
    <div class="summary-row"><span class="lbl">Дата и время</span><span class="val">${dtStr}</span></div>`;
  document.getElementById('answersList').innerHTML=quiz.map((q,i)=>{
    const ok=answers[i]===q.ans;const ua=answers[i]>=0?q.opts[answers[i]]:'Не ответил';
    return `<div class="a-item ${ok?'correct':'wrong'}"><div class="q-num">Вопрос ${i+1}</div><div class="q-t">${q.q}</div><div class="a-row"><span>Ответ: </span><span class="${ok?'ok':'fail'}">${ua} ${ok?'✓':'✗'}</span></div>${!ok?`<div class="correct-ans">Правильный ответ: ${q.opts[q.ans]}</div>`:''}</div>`;
  }).join('');
  resultsPayload={testName:'7.74.Poland',firstName,lastName,fullName:`${lastName} ${firstName}`,class:klass,dateTime:dtStr,score:correct,totalQuestions:quiz.length,errors,percent:pct,grade,answers:quiz.map((q,i)=>({question:q.q,userAnswer:answers[i]>=0?q.opts[answers[i]]:'Не ответил',correctAnswer:q.opts[q.ans],isCorrect:answers[i]===q.ans}))};
  sendResults();
}
function sendResults(){
  const btn=document.getElementById('sendBtn');const status=document.getElementById('sendStatus');
  if(!resultsPayload)return;
  btn.disabled=true;btn.textContent='⏳ Отправляем…';status.textContent='Подождите, идёт отправка…';status.style.color='#555';
  fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(resultsPayload)})
  .then(()=>{btn.textContent='✅ Отправлено!';btn.style.background='#28a745';status.textContent='✅ Результаты успешно отправлены учителю!';status.style.color='#28a745';})
  .catch(()=>{btn.disabled=false;btn.textContent='🔁 Попробовать снова';status.textContent='❌ Ошибка. Проверьте интернет и повторите.';status.style.color='#dc3545';});
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('fName').focus();
  document.getElementById('fName').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('fLast').focus();});
  document.getElementById('fLast').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('fClass').focus();});
  document.getElementById('fClass').addEventListener('keydown',e=>{if(e.key==='Enter')startQuiz();});
});
</script>
</body>
</html>
