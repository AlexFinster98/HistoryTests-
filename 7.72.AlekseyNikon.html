<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7.72.AlekseyNikon</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
:root{--gold:#c9954a;--gold-light:#e8b96a;--dark:#0e0b07;--dark2:#1a1208;--dark3:#251a0e;--stone:#3a2e1e;--stone-light:#5a4a30;--red:#8b1a1a;--red-bright:#c0392b;--cream:#f5e6c8;--cream2:#e8d5a8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lora',Georgia,serif;background:var(--dark);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(139,26,26,.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(201,149,74,.08) 0%,transparent 50%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(201,149,74,.04) 39px,rgba(201,149,74,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(201,149,74,.04) 39px,rgba(201,149,74,.04) 40px);pointer-events:none;z-index:0;}
.screen{position:relative;z-index:1;width:100%;max-width:680px;padding:20px;display:none;animation:fadeIn .5s ease;}.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{background:linear-gradient(145deg,var(--dark2),var(--dark3));border:1px solid rgba(201,149,74,.3);border-radius:2px;padding:44px 48px;position:relative;box-shadow:0 0 0 1px rgba(201,149,74,.08),0 20px 60px rgba(0,0,0,.7),inset 0 1px 0 rgba(201,149,74,.15);}
.card::before,.card::after{content:'✦';position:absolute;color:var(--gold);font-size:10px;opacity:.5;}.card::before{top:12px;left:16px;}.card::after{bottom:12px;right:16px;}
.top-line{display:flex;align-items:center;gap:10px;margin-bottom:28px;}.top-line::before,.top-line::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,149,74,.5));}.top-line::after{background:linear-gradient(to left,transparent,rgba(201,149,74,.5));}.top-line span{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;white-space:nowrap;}
h1{font-family:'Cinzel',serif;font-size:clamp(17px,3.5vw,23px);font-weight:900;color:var(--cream);text-align:center;margin-bottom:6px;letter-spacing:1px;line-height:1.3;}
.subtitle{font-family:'Lora',serif;font-style:italic;text-align:center;color:var(--gold-light);font-size:14px;margin-bottom:32px;opacity:.85;}
.field{margin-bottom:18px;}.field label{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,149,74,.25);border-radius:2px;padding:13px 16px;color:var(--cream);font-family:'Lora',serif;font-size:15px;outline:none;transition:border-color .2s,background .2s;}
.field input:focus{border-color:rgba(201,149,74,.7);background:rgba(201,149,74,.06);}.field input::placeholder{color:rgba(245,230,200,.3);}
.fields-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.btn{width:100%;background:linear-gradient(135deg,var(--red) 0%,#6b1515 100%);border:1px solid rgba(201,149,74,.4);color:var(--cream);font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:16px;cursor:pointer;border-radius:2px;margin-top:24px;transition:all .2s;}
.btn:hover{background:linear-gradient(135deg,#a02020 0%,#8b1a1a 100%);border-color:rgba(201,149,74,.7);box-shadow:0 4px 20px rgba(139,26,26,.4);transform:translateY(-1px);}.btn:active{transform:translateY(0);}
.btn-secondary{background:linear-gradient(135deg,var(--stone) 0%,var(--stone-light) 100%);border-color:rgba(201,149,74,.3);margin-top:12px;font-size:11px;letter-spacing:2px;}
.btn-secondary:hover{background:linear-gradient(135deg,var(--stone-light) 0%,#6a5840 100%);}
.timer-wrap{text-align:center;margin-bottom:28px;}.timer-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:6px;}
.timer-bar-bg{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:6px;}.timer-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;transition:width .1s linear,background .3s;width:100%;}.timer-bar.warning{background:linear-gradient(90deg,var(--red-bright),#e74c3c);}
.timer-num{font-family:'Cinzel',serif;font-size:22px;font-weight:900;color:var(--gold-light);}.timer-num.warning{color:#e74c3c;}
.progress-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}.progress-dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(201,149,74,.4);background:transparent;transition:all .3s;}.dot.done{background:var(--gold);border-color:var(--gold);}.dot.current{background:rgba(201,149,74,.3);border-color:var(--gold);box-shadow:0 0 8px rgba(201,149,74,.5);}
.q-counter{font-family:'Cinzel',serif;font-size:11px;color:rgba(245,230,200,.4);letter-spacing:1px;}
.question-text{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--cream);margin-bottom:24px;line-height:1.5;min-height:56px;}
.options{display:flex;flex-direction:column;gap:10px;}
.option{background:rgba(255,255,255,.03);border:1px solid rgba(201,149,74,.2);border-radius:2px;padding:14px 18px;cursor:pointer;font-family:'Lora',serif;font-size:15px;color:var(--cream2);transition:all .2s;display:flex;align-items:center;gap:12px;}
.option-letter{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold);min-width:18px;letter-spacing:1px;}
.option:hover:not(.disabled){background:rgba(201,149,74,.08);border-color:rgba(201,149,74,.5);transform:translateX(4px);}
.option.correct{background:rgba(45,106,45,.25);border-color:rgba(45,180,45,.5);color:#a8d8a8;}.option.correct .option-letter{color:#6dbd6d;}
.option.wrong{background:rgba(139,26,26,.25);border-color:rgba(192,57,43,.5);color:#d8a0a0;}.option.wrong .option-letter{color:var(--red-bright);}.option.disabled{cursor:default;}
.result-grade{text-align:center;margin-bottom:28px;}.grade-num{font-family:'Cinzel',serif;font-size:80px;font-weight:900;line-height:1;margin-bottom:4px;}
.grade-5{color:#6dbd6d;text-shadow:0 0 30px rgba(109,189,109,.3);}.grade-4{color:var(--gold-light);text-shadow:0 0 30px rgba(232,185,106,.3);}.grade-3{color:#e8963a;text-shadow:0 0 30px rgba(232,150,58,.3);}.grade-2{color:var(--red-bright);text-shadow:0 0 30px rgba(192,57,43,.3);}
.grade-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,230,200,.5);}
.result-divider{height:1px;background:linear-gradient(to right,transparent,rgba(201,149,74,.4),transparent);margin:20px 0;}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px;}.result-row:last-of-type{border-bottom:none;}
.result-row .lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}.result-row .val{font-family:'Lora',serif;color:var(--cream2);}
.send-status{text-align:center;margin-top:14px;font-size:12px;font-family:'Cinzel',serif;letter-spacing:1px;min-height:18px;color:rgba(245,230,200,.4);}.send-status.ok{color:#6dbd6d;}.send-status.err{color:var(--red-bright);}
#blocked-screen .card{border-color:rgba(192,57,43,.4);text-align:center;}.blocked-icon{font-size:48px;margin-bottom:16px;}
.blocked-msg{font-family:'Lora',serif;font-size:16px;line-height:1.6;color:var(--cream2);margin-bottom:24px;}.blocked-word{font-style:italic;color:var(--red-bright);}
@media(max-width:520px){.card{padding:28px 22px;}.fields-row{grid-template-columns:1fr;}h1{font-size:16px;}.question-text{font-size:16px;}.option{font-size:14px;}.grade-num{font-size:64px;}}</style>
</head>
<body>
<div id="title-screen" class="screen active">
  <div class="card">
    <div class="top-line"><span>История · 7 класс</span></div>
    <h1>Алексей Михайлович. Подчинение церкви</h1>
    <p class="subtitle">Введи свои данные перед началом</p>
    <div class="fields-row">
      <div class="field"><label>Имя</label><input type="text" id="inp-name" placeholder="Алексей" autocomplete="off" maxlength="40"></div>
      <div class="field"><label>Фамилия</label><input type="text" id="inp-surname" placeholder="Романов" autocomplete="off" maxlength="40"></div>
    </div>
    <div class="field"><label>Класс</label><input type="text" id="inp-class" placeholder="7В" autocomplete="off" maxlength="20"></div>
    <button class="btn" onclick="startTest()">Начать тест</button>
  </div>
</div>
<div id="blocked-screen" class="screen">
  <div class="card">
    <div class="top-line"><span>Ой-ой</span></div>
    <div class="blocked-icon">😄</div>
    <p class="blocked-msg" id="blocked-msg"></p>
    <button class="btn btn-secondary" onclick="resetToTitle()">Заполнить заново</button>
  </div>
</div>
<div id="question-screen" class="screen">
  <div class="card">
    <div class="timer-wrap">
      <span class="timer-label">Время на ответ</span>
      <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar"></div></div>
      <span class="timer-num" id="timer-num">6</span>
    </div>
    <div class="progress-line">
      <div class="progress-dots" id="progress-dots"></div>
      <span class="q-counter" id="q-counter">1 / 5</span>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options-list"></div>
  </div>
</div>
<div id="result-screen" class="screen">
  <div class="card">
    <div class="top-line"><span>Результат</span></div>
    <div class="result-grade">
      <div class="grade-num" id="grade-num"></div>
      <div class="grade-label" id="grade-label"></div>
    </div>
    <div class="result-divider"></div>
    <div class="result-row"><span class="lbl">Ученик</span><span class="val" id="res-name"></span></div>
    <div class="result-row"><span class="lbl">Класс</span><span class="val" id="res-class"></span></div>
    <div class="result-row"><span class="lbl">Правильных</span><span class="val" id="res-correct"></span></div>
    <div class="result-row"><span class="lbl">Дата и время</span><span class="val" id="res-datetime"></span></div>
    <div class="send-status" id="send-status">Отправка результатов…</div>
    <button class="btn btn-secondary" id="retry-btn" style="display:none" onclick="sendResults()">Отправить повторно</button>
  </div>
</div>
<script>const MAT=["аборт","анус","басран","бикса","блуд","блудилище","букакке","вагина","влагалище","волосянка","выеть","выпердеть","выпердыш","выссака","высцаный","глиста","гнида","говенка","говешка","говназия","говнюха","говнядина","говнять","дермо","дерьмище","долдон","дрист","дристануть","дристни","дура","дурак","заговнять","засерун","засирать","засраный","курвенок","курвин","курвяжник","курвяжница","курвяжный","мокрохвостка","мокрощелка","моча","наговнять","насцать","нахезать","недомерок","обосцать","обосцаться","обсирать","отпороть","пенис","перданная","перданное","перданный","пердел","пердение","пердильник","пердунина","пердунья","пердуха","передок","пернуть","пипишка","письку","писять","питишка","плеха","подхвостие","попысать","посрал","поцоватый","презерватив","проскотина","просраная","проссаная","пысать","растыка","сволота","секель","серун","серька","сика","сикать","сикель","сирано","сирать","скотина","скотское","скуреха","скурея","скуряга","скуряжничать","сосать","сосущее","срака","сраный","сраным","срать","срун","ссака","ссаки","ссаное","ссать","старпер","струк","сцавинье","сцака","сцаки","сцание","сцуль","сыкун","титечка","титечный","титка","титочка","титька","триговногнойная","трипер","триперданутая","усцаться","фик","хезать","хуй","жопа","пизда","сушамипизда"];const MEMS=["черемша","67","sixseven","превед","жиза","ничоси","кандибобер","ядумаласова","ждун","окаянная","ахахахахабожекакаягадость","этофиаскобратан","бабкапротивнаяпротивен","слабоумиеиотвага","норм","краш","шипперить","ору","изнанка","скибидитуалет","сигма","альфа","бета","явоРту","мечтаю","какденьгинолучше","уменянетэтомувопросов","этобаза","сначалабазапотомакадемия","авотесли","сплэшвест","срочнонц","ливнул","го","трэш","кринж","испанскийстыд","рофл","рили","паль","спалился","шокконтент","едувпоезде","сосёчка","девочкаскаре","невывожу","синдромутёнка","амневсёравно","ващенеочём","язатупил","сложныеминуты","миньон","тынорм","этокакойтопозор","ойвсё","танцыкнопкабабло","гделогика","янезнает","падажжи","убейсебяобстену","вжух","ахахахвау"];
const LMAP={'a':'а','e':'е','o':'о','p':'р','c':'с','x':'х','y':'у','k':'к','m':'м','t':'т','b':'в','0':'о','3':'з','4':'а','6':'б','@':'а','$':'с','!':'и','1':'и','ё':'е','й':'и'};
function normalize(s){s=s.toLowerCase().trim();s=s.replace(/[aekopcxymbт]/g,c=>LMAP[c]||c);s=s.replace(/[0346@$!1]/g,c=>LMAP[c]||c);s=s.replace(/ё/g,'е').replace(/й/g,'и');s=s.replace(/[^а-яa-z]/g,'');s=s.replace(/(.){1,}/g,'$1');return s;}
function checkBadWord(raw){const n=normalize(raw);if(!n)return null;for(const w of MAT){if(n.includes(normalize(w)))return raw.trim();}for(const w of MEMS){if(n.includes(normalize(w)))return raw.trim();}return null;}
function checkAllFields(){const ff=[document.getElementById('inp-name').value,document.getElementById('inp-surname').value,document.getElementById('inp-class').value];for(const f of ff){const h=checkBadWord(f);if(h)return h;}return null;}
const QR=[{"q": "Зачем Алексей Михайлович призвал Никона?", "options": ["Чтобы ввести новые налоги через церковь", "Для проведения церковной реформы", "Чтобы примириться с Польшей", "Для управления иностранными делами"], "correct": 1}, {"q": "Что сделал Никон с иноверцами в Москве?", "options": ["Принудил к принятию православия", "Казнил их как еретиков", "Выселил на отдельную территорию — Немецкую слободу", "Изгнал за пределы страны"], "correct": 2}, {"q": "Кем был Никон?", "options": ["Родственник царя из рода Романовых", "Глава церкви, харизматичный фанатик, имел огромное влияние на Алексея", "Польский священник на русской службе", "Советник по вопросам права"], "correct": 1}, {"q": "Какую ошибку совершил Никон, приведшую к его отставке?", "options": ["Растратил церковную казну", "Тайно переписывался с поляками", "Попытался управлять Алексеем Михайловичем", "Отменил Соборное Уложение"], "correct": 2}, {"q": "В какие годы продолжалось патриаршество Никона?", "options": ["1645–1652 гг.", "1652–1666 гг.", "1660–1680 гг.", "1666–1700 гг."], "correct": 1}];
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let questions=[],current=0,wrong=0,timerId=null,timeLeft=6;
const TMAX=6,URL='https://script.google.com/macros/s/AKfycbyAK0g6S7_HTpSWhFYBzXaXsjwGSQQRw7mcL2Z1xWDT6fWzI4FxjSC2PPdPXe9d2c0kgQ/exec';let fd={};
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function resetToTitle(){showScreen('title-screen');}
function startTest(){
  const hit=checkAllFields();
  if(hit){document.getElementById('blocked-msg').innerHTML=`Все мы посмеялись с твоего смешного «<span class="blocked-word">${hit}</span>». А теперь в конце урока сдаёшь тетрадь :)`;showScreen('blocked-screen');return;}
  const name=document.getElementById('inp-name').value.trim(),surname=document.getElementById('inp-surname').value.trim(),cls=document.getElementById('inp-class').value.trim();
  if(!name||!surname||!cls){alert('Заполни все поля!');return;}
  fd={name,surname,cls};
  questions=shuffle(QR).map(q=>{const idx=q.options.map((o,i)=>{return{o,ok:i===q.correct}});const sh=shuffle(idx);return{q:q.q,options:sh.map(x=>x.o),correct:sh.findIndex(x=>x.ok)}});
  current=0;wrong=0;buildDots();showScreen('question-screen');showQuestion();
}
function buildDots(){const c=document.getElementById('progress-dots');c.innerHTML='';for(let i=0;i<questions.length;i++){const d=document.createElement('div');d.className='dot';d.id='dot-'+i;c.appendChild(d);}}
function updateDots(idx){for(let i=0;i<questions.length;i++){document.getElementById('dot-'+i).className='dot'+(i<idx?' done':i===idx?' current':'');}}
const LL=['А','Б','В','Г'];
function showQuestion(){const q=questions[current];document.getElementById('q-counter').textContent=`${current+1} / ${questions.length}`;document.getElementById('question-text').textContent=q.q;updateDots(current);
  const list=document.getElementById('options-list');list.innerHTML='';
  q.options.forEach((o,i)=>{const b=document.createElement('div');b.className='option';b.innerHTML=`<span class="option-letter">${LL[i]}</span>${o}`;b.onclick=()=>answer(i);list.appendChild(b);});
  startTimer();}
function startTimer(){clearInterval(timerId);timeLeft=TMAX;updTimer();timerId=setInterval(()=>{timeLeft-=.1;if(timeLeft<=0){timeLeft=0;updTimer();clearInterval(timerId);answer(-1);}else updTimer();},100);}
function updTimer(){const p=(timeLeft/TMAX)*100,bar=document.getElementById('timer-bar'),num=document.getElementById('timer-num'),w=timeLeft<=2;bar.style.width=p+'%';bar.className='timer-bar'+(w?' warning':'');num.className='timer-num'+(w?' warning':'');num.textContent=Math.ceil(timeLeft);}
function answer(chosen){clearInterval(timerId);const q=questions[current];const opts=document.querySelectorAll('#options-list .option');opts.forEach(o=>o.classList.add('disabled'));
  if(chosen===q.correct){if(chosen>=0)opts[chosen].classList.add('correct');}else{wrong++;if(chosen>=0)opts[chosen].classList.add('wrong');opts[q.correct].classList.add('correct');}
  setTimeout(()=>{current++;if(current<questions.length)showQuestion();else showResult();},900);}
function calcGrade(w){if(w===0)return'5';if(w===1)return'4';if(w===2)return'4−';if(w===3)return'3';return'2';}
function showResult(){
  const grade=calcGrade(wrong),correct=questions.length-wrong,now=new Date();
  const dt=now.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('grade-num').textContent=grade;
  document.getElementById('grade-num').className='grade-num grade-'+grade[0];
  document.getElementById('grade-label').textContent=grade==='4−'?'четыре с минусом':grade==='5'?'отлично':grade==='4'?'хорошо':grade==='3'?'удовлетворительно':'неудовлетворительно';
  document.getElementById('res-name').textContent=fd.name+' '+fd.surname;
  document.getElementById('res-class').textContent=fd.cls;
  document.getElementById('res-correct').textContent=correct+' из '+questions.length;
  document.getElementById('res-datetime').textContent=dt;
  fd.grade=grade;fd.correct=correct;fd.wrong=wrong;fd.total=questions.length;fd.datetime=dt;fd.test='7.72.AlekseyNikon';
  showScreen('result-screen');sendResults();
}
function sendResults(){
  const st=document.getElementById('send-status'),rb=document.getElementById('retry-btn');
  st.textContent='Отправка результатов…';st.className='send-status';rb.style.display='none';
  const p={
    test:fd.test,
    firstName:fd.name,
    lastName:fd.surname,
    fullName:fd.surname+' '+fd.name,
    class:fd.cls,
    datetime:fd.datetime,
    correct:fd.correct,
    total:fd.total,
    wrong:fd.wrong,
    percent:Math.round((fd.correct/fd.total)*100),
    grade:fd.grade
  };
  fetch(URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})
  .then(()=>{st.textContent='✓ Результат отправлен учителю';st.className='send-status ok';})
  .catch(()=>{st.textContent='Не удалось отправить. Попробуй ещё раз.';st.className='send-status err';rb.style.display='block';});
}
